<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="published" content="2026-04-06">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUM PRINTS — Lethal Method</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #C42020;
            --accent-light: rgba(196, 32, 32, 0.08);
            --bg: #FFFFFF;
            --card: #FFFFFF;
            --text: #1D1D1F;
            --text-secondary: #6E6E73;
            --border: #E5E5E7;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: clamp(3rem, 8vw, 6rem) clamp(1.25rem, 4vw, 2rem) 4rem;
        }

        /* Header */
        header {
            margin-bottom: 2.5rem;
            animation: fadeIn 0.6s ease-out both;
        }

        .label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #86868B;
            margin-bottom: 0.75rem;
            display: block;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.1;
            margin-bottom: 0.4rem;
        }

        .meta {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.65rem 1.4rem;
            border-radius: 980px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: #1D1D1F;
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background: #424245;
        }

        .btn-primary svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .btn-outline {
            background: transparent;
            color: #1D1D1F;
            border: 1px solid #D2D2D7;
        }

        .btn-outline:hover {
            background: #F5F5F7;
        }

        .streaming-note {
            font-size: 0.75rem;
            color: #86868B;
            margin-top: 0.75rem;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 2rem;
        }

        /* Track list */
        .track-list {
            padding-bottom: 120px;
        }

        .track-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .track-list-header h2 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .track-count {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .track {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            margin: 4px 0;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .track:hover {
            background: var(--accent-light);
        }

        .track.active {
            background: var(--accent-light);
        }

        .track.playing .track-number {
            display: none;
        }

        .track.playing .track-eq {
            display: flex;
        }

        .track-number {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }

        .track-eq {
            display: none;
            align-items: flex-end;
            gap: 2px;
            width: 28px;
            height: 18px;
            justify-content: center;
            flex-shrink: 0;
        }

        .track-eq span {
            width: 3px;
            background: var(--accent);
            border-radius: 1px;
            animation: eq 0.8s ease-in-out infinite alternate;
        }

        .track-eq span:nth-child(1) { height: 60%; animation-delay: 0s; }
        .track-eq span:nth-child(2) { height: 100%; animation-delay: 0.2s; }
        .track-eq span:nth-child(3) { height: 40%; animation-delay: 0.4s; }
        .track-eq span:nth-child(4) { height: 80%; animation-delay: 0.1s; }

        @keyframes eq {
            0% { height: 20%; }
            100% { height: 100%; }
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track.playing .track-title,
        .track.active .track-title {
            color: var(--accent);
        }

        .track-detail {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .track-duration {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        /* Now Playing Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .player-bar.visible {
            transform: translateY(0);
        }

        .player-progress-bar {
            position: absolute;
            top: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--border);
            cursor: pointer;
        }

        .player-progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 0 2px 2px 0;
        }

        .player-content {
            max-width: 680px;
            margin: 0 auto;
            padding: 12px 20px 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .player-play-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .player-play-btn:hover {
            transform: scale(1.05);
        }

        .player-play-btn:active {
            transform: scale(0.95);
        }

        .player-play-btn svg {
            fill: white;
            width: 18px;
            height: 18px;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-time {
            font-size: 12px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .player-ctrl-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease;
        }

        .player-ctrl-btn:hover {
            background: var(--accent-light);
        }

        .player-ctrl-btn svg {
            fill: var(--text-secondary);
            width: 16px;
            height: 16px;
        }

        /* Loading state */
        .track-loading {
            display: none;
        }

        .track.loading .track-loading {
            display: block;
        }

        .track.loading .track-duration {
            display: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 0 40px;
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .track { padding: 12px 12px; gap: 12px; }
            .track-title { font-size: 14px; }
            .player-content { gap: 12px; padding: 10px 16px; }
        }

        /* Fade in */
        .fade-in {
            opacity: 0;
            transform: translateY(12px);
            animation: fadeIn 0.5s ease forwards;
        }

        .fade-in:nth-child(2) { animation-delay: 0.05s; }
        .fade-in:nth-child(3) { animation-delay: 0.1s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="label">Drum Tracking Session</span>
        <h1>Drum Prints</h1>
        <p class="meta">Recorded by Zach Ramsey for Lethal Method &mdash; 11 Tracks</p>
        <div class="actions">
            <a class="btn btn-primary" href="https://www.dropbox.com/scl/fo/23i8lvmzaea8faukuii02/AH1BOwvMCMLZbTINiAtKcnA?rlkey=u55np5jvdq9icfpyc5dcuwzpl&e=1&st=6w8ok607&dl=0" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Download WAVs on Dropbox
            </a>
        </div>
        <p class="streaming-note">Streaming previews are compressed MP3. For full-quality uncompressed WAV files, download from Dropbox.</p>
    </header>

    <div class="divider"></div>

    <div class="track-list fade-in">
        <div class="track-list-header">
            <h2>Tracks</h2>
            <span class="track-count">Click to preview</span>
        </div>

        <div id="tracks"></div>
    </div>

    <div class="footer fade-in">
        Matt Matheson Creative
    </div>
</div>

<!-- Player Bar -->
<div class="player-bar" id="playerBar">
    <div class="player-progress-bar" id="progressBar">
        <div class="player-progress-fill" id="progressFill"></div>
    </div>
    <div class="player-content">
        <button class="player-play-btn" id="playPauseBtn" aria-label="Play/Pause">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div class="player-info">
            <div class="player-title" id="playerTitle">—</div>
            <div class="player-time" id="playerTime">0:00 / 0:00</div>
        </div>
        <div class="player-controls">
            <button class="player-ctrl-btn" id="prevBtn" aria-label="Previous">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="player-ctrl-btn" id="nextBtn" aria-label="Next">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>
</div>

<audio id="audio" preload="none"></audio>

<script>
const tracks = [
    { title: "Bad One", file: "BAD ONE_DRUMS T1", url: "audio/BAD%20ONE_DRUMS%20T1.mp3" },
    { title: "Breaking It Down", file: "BREAKING IT DOWN_DRUMS T1", url: "audio/BREAKING%20IT%20DOWN_DRUMS%20T1.mp3" },
    { title: "No Hand Outs", file: "NO HAND OUTS_DRUMS T1.1", url: "audio/NO%20HAND%20OUTS_DRUMS%20T1.1.mp3" },
    { title: "Soul Power", file: "SOUL POWER_DRUMS T1.1", url: "audio/SOUL%20POWER_DRUMS%20T1.1.mp3" },
    { title: "Territory", file: "TERRITORY_DRUMS T1.1", url: "audio/TERRITORY_DRUMS%20T1.1.mp3" },
    { title: "The Hard Way", file: "THE HARD WAY_DRUMS T1", url: "audio/THE%20HARD%20WAY_DRUMS%20T1.mp3" },
    { title: "The Method", file: "THE METHOD_DRUMS T1", url: "audio/THE%20METHOD_DRUMS%20T1.mp3" },
    { title: "The Purist Love", file: "THE PURIST LOVE_DRUMS T1", url: "audio/THE%20PURIST%20LOVE_DRUMS%20T1.mp3" },
    { title: "This World", file: "THIS WORLD_DRUMS T1", url: "audio/THIS%20WORLD_DRUMS%20T1.mp3" },
    { title: "Time to Breathe", file: "TIME TO BREATHE_DRUMS T1", url: "audio/TIME%20TO%20BREATHE_DRUMS%20T1.mp3" },
    { title: "Trapped", file: "TRAPPED_DRUMS T1", url: "audio/TRAPPED_DRUMS%20T1.mp3" },
];

const audio = document.getElementById('audio');
const playerBar = document.getElementById('playerBar');
const playPauseBtn = document.getElementById('playPauseBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const playerTitle = document.getElementById('playerTitle');
const playerTime = document.getElementById('playerTime');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const tracksContainer = document.getElementById('tracks');

let currentIndex = -1;
let isPlaying = false;

// Render tracks
tracks.forEach((track, i) => {
    const el = document.createElement('div');
    el.className = 'track';
    el.dataset.index = i;
    el.innerHTML = `
        <span class="track-number">${String(i + 1).padStart(2, '0')}</span>
        <div class="track-eq"><span></span><span></span><span></span><span></span></div>
        <div class="track-info">
            <div class="track-title">${track.title}</div>
            <div class="track-detail">${track.file}</div>
        </div>
        <div class="track-duration">—:——</div>
        <div class="track-loading"><div class="spinner"></div></div>
    `;
    el.addEventListener('click', () => playTrack(i));
    tracksContainer.appendChild(el);
});

function formatTime(s) {
    if (!s || !isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
}

function playTrack(index) {
    if (index === currentIndex && isPlaying) {
        pause();
        return;
    }
    if (index === currentIndex && !isPlaying) {
        resume();
        return;
    }

    currentIndex = index;
    const track = tracks[index];

    // Update UI
    document.querySelectorAll('.track').forEach(el => {
        el.classList.remove('active', 'playing', 'loading');
    });
    const trackEl = tracksContainer.children[index];
    trackEl.classList.add('active', 'loading');

    // Load and play
    audio.src = track.url;
    audio.load();

    playerTitle.textContent = track.title;
    playerTime.textContent = '0:00 / 0:00';
    progressFill.style.width = '0%';
    playerBar.classList.add('visible');

    audio.play().then(() => {
        isPlaying = true;
        trackEl.classList.remove('loading');
        trackEl.classList.add('playing');
        updatePlayPauseIcon();
    }).catch(e => {
        trackEl.classList.remove('loading');
        console.error('Playback failed:', e);
    });
}

function pause() {
    audio.pause();
    isPlaying = false;
    updatePlayPauseIcon();
    document.querySelectorAll('.track').forEach(el => el.classList.remove('playing'));
    const trackEl = tracksContainer.children[currentIndex];
    if (trackEl) trackEl.classList.add('active');
}

function resume() {
    audio.play();
    isPlaying = true;
    updatePlayPauseIcon();
    const trackEl = tracksContainer.children[currentIndex];
    if (trackEl) trackEl.classList.add('playing');
}

function updatePlayPauseIcon() {
    playIcon.style.display = isPlaying ? 'none' : 'block';
    pauseIcon.style.display = isPlaying ? 'block' : 'none';
}

// Controls
playPauseBtn.addEventListener('click', () => {
    if (currentIndex === -1) { playTrack(0); return; }
    isPlaying ? pause() : resume();
});

prevBtn.addEventListener('click', () => {
    if (currentIndex <= 0) return;
    playTrack(currentIndex - 1);
});

nextBtn.addEventListener('click', () => {
    if (currentIndex >= tracks.length - 1) return;
    playTrack(currentIndex + 1);
});

// Progress
audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    playerTime.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
});

audio.addEventListener('loadedmetadata', () => {
    if (currentIndex >= 0) {
        const durEl = tracksContainer.children[currentIndex].querySelector('.track-duration');
        if (durEl) durEl.textContent = formatTime(audio.duration);
    }
});

// Auto-advance
audio.addEventListener('ended', () => {
    if (currentIndex < tracks.length - 1) {
        playTrack(currentIndex + 1);
    } else {
        isPlaying = false;
        updatePlayPauseIcon();
        document.querySelectorAll('.track').forEach(el => el.classList.remove('playing'));
    }
});

// Seek
progressBar.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); playPauseBtn.click(); }
    if (e.code === 'ArrowLeft') prevBtn.click();
    if (e.code === 'ArrowRight') nextBtn.click();
});
</script>

</body>
</html>
