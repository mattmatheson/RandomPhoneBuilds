<!DOCTYPE html>

<head>
<meta charset="UTF-8"><meta name="published" content="2026-05-21">

<title>Explore Crossville — Final Cuts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    background: #FFFFFF;
    color: #1D1D1F;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: clamp(3rem, 8vw, 6rem) clamp(1.25rem, 4vw, 2rem) 4rem;
  }

  header {
    margin-bottom: 4rem;
    animation: fadeIn 0.6s ease-out both;
  }

  .label {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #86868B;
    margin-bottom: 0.75rem;
    display: block;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 0.4rem;
  }

  .meta {
    font-size: 0.95rem;
    font-weight: 400;
    color: #6E6E73;
  }

  .actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.65rem 1.4rem;
    border-radius: 980px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
  }

  .btn-primary { background: #1D1D1F; color: #FFFFFF; }
  .btn-primary:hover { background: #424245; }

  .btn-outline {
    background: transparent;
    color: #1D1D1F;
    border: 1px solid #D2D2D7;
  }

  .info-box {
    background: #F5F5F7;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin: 0 0 2rem;
    font-size: 0.85rem;
    color: #424245;
    line-height: 1.7;
  }

  .info-box strong { color: #1D1D1F; }

  .info-box .credit {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid #E5E5E7;
    font-size: 0.78rem;
    color: #6E6E73;
  }

  .divider {
    height: 1px;
    background: #E5E5E7;
    margin: 0 0 3rem;
  }

  .video-card {
    margin-bottom: 3rem;
    animation: fadeIn 0.5s ease-out both;
  }

  .video-card video {
    width: 100%;
    height: auto;
    display: block;
    background: #000;
    border-radius: 8px;
  }

  .video-card .vmeta {
    margin-top: 1rem;
    padding: 0 0.25rem;
  }

  .video-card .vlabel {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.25rem 0.6rem;
    border-radius: 980px;
    margin-bottom: 0.6rem;
  }

  .vlabel-tv { background: #1D1D1F; color: #fff; }
  .vlabel-web { background: #F5F5F7; color: #424245; border: 1px solid #E5E5E7; }

  .video-card h2 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin-bottom: 0.4rem;
  }

  .video-card .vstats {
    margin-top: 0.6rem;
    font-size: 0.72rem;
    color: #86868B;
  }

  footer {
    text-align: center;
    padding: 3rem 0 2rem;
    color: #86868B;
    font-size: 0.7rem;
    font-weight: 400;
  }

  footer a { color: #86868B; text-decoration: none; }
  footer a:hover { color: #1D1D1F; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .container { padding-left: 1rem; padding-right: 1rem; }
    .video-card { margin-bottom: 2.25rem; }
  }
</style>
</head>
