<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Phone Builds</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #C42020;
    --bg: #FAFAFA;
    --text-primary: #1D1D1F;
    --text-secondary: #6E6E73;
    --divider: #E5E5E7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    border-top: 3px solid var(--accent);
    line-height: 1.7;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(2rem, 6vw, 6rem) clamp(1.5rem, 4vw, 2rem);
  }
  header {
    margin-bottom: 3rem;
    animation: fadeInUp 0.6s ease-out both;
  }
  h1 {
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }
  header p {
    font-size: 1.1rem;
    color: var(--text-secondary);
    font-weight: 300;
  }
  .projects {
    list-style: none;
  }
  .projects li {
    border-top: 1px solid var(--divider);
    animation: fadeInUp 0.5s ease-out both;
  }
  .projects li:nth-child(1) { animation-delay: 0.1s; }
  .projects li:nth-child(2) { animation-delay: 0.15s; }
  .projects li:nth-child(3) { animation-delay: 0.2s; }
  .projects li:nth-child(4) { animation-delay: 0.25s; }
  .projects li:nth-child(5) { animation-delay: 0.3s; }
  .projects li:nth-child(6) { animation-delay: 0.35s; }
  .projects li:nth-child(7) { animation-delay: 0.4s; }
  .projects li:nth-child(8) { animation-delay: 0.45s; }
  .projects li:nth-child(9) { animation-delay: 0.5s; }
  .projects li:nth-child(10) { animation-delay: 0.55s; }
  .projects a {
    display: block;
    padding: 1.25rem 0;
    text-decoration: none;
    color: var(--text-primary);
    transition: color 0.2s ease;
  }
  .projects a:hover {
    color: var(--accent);
  }
  .projects .title {
    font-size: 1.15rem;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .projects .desc {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 300;
    margin-top: 0.25rem;
  }
  .empty {
    padding: 3rem 0;
    text-align: center;
    color: var(--text-secondary);
    font-weight: 300;
  }
  footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--divider);
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 300;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(15px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Random Phone Builds</h1>
    <p>Research docs, HTML articles, and random builds from my phone.</p>
  </header>

  <ul class="projects" id="projects">
    <!-- PROJECT_LIST_START -->
    <li><a href="Nathan_crt/"><span class="title">Nathan_crt</span><br><span class="desc">HDMI-to-RCA Converter Research for CRT Gaming</span></a></li>
    <!-- PROJECT_LIST_END -->
  </ul>

  <footer>
    <p>Hosted on GitHub Pages &middot; <a href="https://github.com/mattmatheson/RandomPhoneBuilds" style="color: var(--text-secondary);">View source</a></p>
  </footer>
</div>
</body>
</html>
